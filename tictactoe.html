<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
      overflow: hidden;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 0.6rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #e94560;
    }

    /* ── Difficulty selector ── */
    #difficulty-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1.2rem;
    }

    #difficulty-row label {
      font-size: 0.8rem;
      letter-spacing: 2px;
      opacity: 0.6;
      text-transform: uppercase;
    }

    .diff-btn {
      padding: 0.3rem 0.9rem;
      border: 2px solid #0f3460;
      border-radius: 20px;
      background: transparent;
      color: #aaa;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 1px;
    }

    .diff-btn:hover { border-color: #e94560; color: #eee; }

    .diff-btn.active.easy   { background: #2ecc71; border-color: #2ecc71; color: #1a1a2e; font-weight: bold; }
    .diff-btn.active.medium { background: #f39c12; border-color: #f39c12; color: #1a1a2e; font-weight: bold; }
    .diff-btn.active.hard   { background: #e94560; border-color: #e94560; color: #fff;    font-weight: bold; }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      min-height: 1.8rem;
      color: #a8dadc;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken):not(.locked) {
      background: #0f3460;
      transform: scale(1.05);
    }

    .cell.locked { cursor: not-allowed; }

    .cell.x { color: #e94560; }
    .cell.o { color: #a8dadc; }

    @keyframes winPulse {
      0%   { background: #0f3460; box-shadow: 0 0 10px #e94560, 0 0 30px #e94560; transform: scale(1); }
      50%  { background: #e94560; box-shadow: 0 0 30px #fff, 0 0 60px #e94560; transform: scale(1.12); }
      100% { background: #0f3460; box-shadow: 0 0 10px #e94560, 0 0 30px #e94560; transform: scale(1); }
    }
    @keyframes winPulseO {
      0%   { background: #0f3460; box-shadow: 0 0 10px #a8dadc, 0 0 30px #a8dadc; transform: scale(1); }
      50%  { background: #a8dadc; box-shadow: 0 0 30px #fff, 0 0 60px #a8dadc; transform: scale(1.12); }
      100% { background: #0f3460; box-shadow: 0 0 10px #a8dadc, 0 0 30px #a8dadc; transform: scale(1); }
    }

    .cell.win   { animation: winPulse  0.6s ease-in-out infinite; }
    .cell.win.o { animation: winPulseO 0.6s ease-in-out infinite; }

    /* thinking indicator */
    @keyframes thinkingPulse {
      0%, 100% { opacity: 0.3; }
      50%       { opacity: 1; }
    }
    #thinking {
      display: none;
      font-size: 0.85rem;
      letter-spacing: 2px;
      color: #a8dadc;
      margin-bottom: 1.5rem;
      animation: thinkingPulse 0.7s ease-in-out infinite;
    }
    #thinking.show { display: block; }

    #bottom-row {
      display: flex;
      gap: 1rem;
      margin-top: 1.8rem;
      position: relative;
      z-index: 10;
    }

    #restart {
      padding: 0.6rem 2rem;
      font-size: 1rem;
      background: #e94560;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.15s, transform 0.1s;
    }
    #restart:hover { background: #c73652; transform: scale(1.04); }

    #score {
      display: flex;
      gap: 2rem;
      margin-bottom: 1rem;
      font-size: 1rem;
    }
    .score-item { text-align: center; }
    .score-label { font-size: 0.75rem; letter-spacing: 2px; opacity: 0.6; }
    .score-value { font-size: 1.8rem; font-weight: bold; }
    #score-x .score-value { color: #e94560; }
    #score-o .score-value { color: #a8dadc; }

    /* ── Confetti ── */
    #confetti-canvas {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none; z-index: 5;
    }

    /* ── Win banner ── */
    #win-banner {
      display: none; position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 20; align-items: center;
      justify-content: center; flex-direction: column;
      pointer-events: none;
    }
    #win-banner.show { display: flex; }

    @keyframes bannerDrop {
      0%   { transform: translateY(-200px) scale(0.5) rotate(-8deg); opacity: 0; }
      60%  { transform: translateY(20px) scale(1.1) rotate(2deg); opacity: 1; }
      80%  { transform: translateY(-10px) scale(0.97) rotate(-1deg); }
      100% { transform: translateY(0) scale(1) rotate(0deg); opacity: 1; }
    }
    @keyframes rainbowFlash {
      0%   { color: #ff0055; text-shadow: 0 0 20px #ff0055, 0 0 50px #ff0055; }
      16%  { color: #ff8800; text-shadow: 0 0 20px #ff8800, 0 0 50px #ff8800; }
      33%  { color: #ffee00; text-shadow: 0 0 20px #ffee00, 0 0 50px #ffee00; }
      50%  { color: #00ff88; text-shadow: 0 0 20px #00ff88, 0 0 50px #00ff88; }
      66%  { color: #00aaff; text-shadow: 0 0 20px #00aaff, 0 0 50px #00aaff; }
      83%  { color: #cc00ff; text-shadow: 0 0 20px #cc00ff, 0 0 50px #cc00ff; }
      100% { color: #ff0055; text-shadow: 0 0 20px #ff0055, 0 0 50px #ff0055; }
    }
    @keyframes subtitleBounce {
      0%, 100% { transform: translateY(0); }
      40%       { transform: translateY(-8px); }
      70%       { transform: translateY(4px); }
    }
    @keyframes subFadeIn {
      from { opacity: 0; transform: scale(0.8); }
      to   { opacity: 1; transform: scale(1); }
    }

    #win-text {
      font-size: 5rem; font-weight: 900;
      letter-spacing: 6px; text-transform: uppercase;
      animation: bannerDrop 0.7s cubic-bezier(.22,.68,0,1.2) forwards,
                 rainbowFlash 0.5s linear 0.7s infinite;
      opacity: 0;
      -webkit-text-stroke: 2px rgba(255,255,255,0.3);
    }
    #win-sub {
      font-size: 2.2rem; font-weight: 700;
      letter-spacing: 3px; color: #fff;
      margin-top: 0.4rem;
      text-shadow: 0 0 20px rgba(255,255,255,0.8);
      opacity: 0;
      animation: subFadeIn 0.4s ease 0.9s forwards, subtitleBounce 0.8s ease-in-out 1.3s infinite;
    }

    .floaty {
      position: fixed; font-size: 3rem;
      pointer-events: none; z-index: 6;
      animation: floatUp 2.5s ease-out forwards;
    }
    @keyframes floatUp {
      0%   { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; }
      100% { transform: translateY(-90vh) rotate(720deg) scale(0.3); opacity: 0; }
    }

    #flash {
      position: fixed; inset: 0;
      background: white; opacity: 0;
      pointer-events: none; z-index: 15;
    }
    @keyframes screenFlash {
      0%   { opacity: 0.7; }
      100% { opacity: 0; }
    }
    #flash.flash { animation: screenFlash 0.4s ease-out forwards; }
  </style>
</head>
<body>

  <canvas id="confetti-canvas"></canvas>
  <div id="flash"></div>

  <div id="win-banner">
    <div id="win-text">WINNER!</div>
    <div id="win-sub"></div>
  </div>

  <h1>Tic Tac Toe</h1>

  <div id="difficulty-row">
    <label>Difficulty:</label>
    <button class="diff-btn easy active" data-diff="easy">Easy</button>
    <button class="diff-btn medium" data-diff="medium">Medium</button>
    <button class="diff-btn hard" data-diff="hard">Hard</button>
  </div>

  <div id="score">
    <div class="score-item" id="score-x">
      <div class="score-label">You (X)</div>
      <div class="score-value" id="val-x">0</div>
    </div>
    <div class="score-item">
      <div class="score-label">Draws</div>
      <div class="score-value" id="val-d">0</div>
    </div>
    <div class="score-item" id="score-o">
      <div class="score-label">CPU (O)</div>
      <div class="score-value" id="val-o">0</div>
    </div>
  </div>

  <div id="status">Your turn</div>
  <div id="thinking">CPU is thinking...</div>

  <div id="board">
    <div class="cell" data-i="0"></div>
    <div class="cell" data-i="1"></div>
    <div class="cell" data-i="2"></div>
    <div class="cell" data-i="3"></div>
    <div class="cell" data-i="4"></div>
    <div class="cell" data-i="5"></div>
    <div class="cell" data-i="6"></div>
    <div class="cell" data-i="7"></div>
    <div class="cell" data-i="8"></div>
  </div>

  <div id="bottom-row">
    <button id="restart">New Game</button>
  </div>

  <script>
    const WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
    let board, gameOver, scores = {X:0, O:0, D:0};
    let cpuThinkTimer = null;
    let difficulty = 'easy';

    // ── Difficulty buttons ────────────────────────────────────
    document.querySelectorAll('.diff-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        difficulty = btn.dataset.diff;
        document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        init();
      });
    });

    // ── AI: pick a move based on difficulty ───────────────────
    function cpuMove() {
      const empty = board.map((v, i) => v === '' ? i : -1).filter(i => i >= 0);
      if (!empty.length) return -1;

      if (difficulty === 'easy') {
        // Purely random
        return empty[Math.floor(Math.random() * empty.length)];
      }

      if (difficulty === 'medium') {
        // Win if possible, block if needed, otherwise random
        const win = findWinningMove('O');
        if (win !== -1) return win;
        const block = findWinningMove('X');
        if (block !== -1) return block;
        return empty[Math.floor(Math.random() * empty.length)];
      }

      // Hard: perfect minimax
      return minimax(board, 'O').index;
    }

    function findWinningMove(player) {
      for (const i of board.map((v, i) => v === '' ? i : -1).filter(i => i >= 0)) {
        board[i] = player;
        const win = checkBoard(board);
        board[i] = '';
        if (win && win.winner === player) return i;
      }
      return -1;
    }

    function minimax(b, player, depth = 0) {
      const result = checkBoard(b);
      if (result) {
        if (result.winner === 'O') return { score:  10 - depth };
        if (result.winner === 'X') return { score: -10 + depth };
        return { score: 0 };
      }

      const moves = b.map((v, i) => v === '' ? i : -1).filter(i => i >= 0);
      let best = player === 'O'
        ? { score: -Infinity }
        : { score:  Infinity };

      for (const i of moves) {
        b[i] = player;
        const result = minimax(b, player === 'O' ? 'X' : 'O', depth + 1);
        b[i] = '';
        result.index = i;
        if (player === 'O' ? result.score > best.score : result.score < best.score) {
          best = result;
        }
      }
      return best;
    }

    // ── Board helpers ─────────────────────────────────────────
    function checkBoard(b) {
      for (const [a, c, d] of WINS) {
        if (b[a] && b[a] === b[c] && b[a] === b[d]) return { winner: b[a], line: [a,c,d] };
      }
      if (b.every(Boolean)) return { draw: true };
      return null;
    }

    // ── Confetti ──────────────────────────────────────────────
    const canvas = document.getElementById('confetti-canvas');
    const ctx = canvas.getContext('2d');
    let confettiAnim = null, confettiPieces = [];

    function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    const COLORS  = ['#e94560','#a8dadc','#ffee00','#ff8800','#cc00ff','#00ff88','#00aaff','#ffffff'];
    const SYMBOLS = ['✕', '○', '★', '✦', '▲', '◆'];

    function spawnConfetti(count) {
      for (let i = 0; i < count; i++) {
        const sym = Math.random() < 0.4;
        confettiPieces.push({
          x: Math.random() * canvas.width, y: -20,
          vx: (Math.random() - 0.5) * 6, vy: Math.random() * 4 + 2,
          rot: Math.random() * Math.PI * 2, rotV: (Math.random() - 0.5) * 0.2,
          color: COLORS[Math.floor(Math.random() * COLORS.length)],
          size: Math.random() * 14 + 8, isSymbol: sym,
          symbol: SYMBOLS[Math.floor(Math.random() * SYMBOLS.length)],
          width: Math.random() * 10 + 6, height: Math.random() * 6 + 4, alpha: 1,
        });
      }
    }

    function tickConfetti() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      confettiPieces = confettiPieces.filter(p => p.alpha > 0.01);
      for (const p of confettiPieces) {
        p.x += p.vx; p.vy += 0.12; p.y += p.vy; p.rot += p.rotV;
        if (p.y > canvas.height * 0.8) p.alpha -= 0.02;
        ctx.save();
        ctx.globalAlpha = p.alpha;
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot);
        if (p.isSymbol) {
          ctx.font = `bold ${p.size}px sans-serif`;
          ctx.fillStyle = p.color;
          ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
          ctx.fillText(p.symbol, 0, 0);
        } else {
          ctx.fillStyle = p.color;
          ctx.fillRect(-p.width / 2, -p.height / 2, p.width, p.height);
        }
        ctx.restore();
      }
      confettiAnim = requestAnimationFrame(tickConfetti);
    }

    function stopConfetti() {
      if (confettiAnim) { cancelAnimationFrame(confettiAnim); confettiAnim = null; }
      confettiPieces = [];
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }

    function burstFloaties(symbol, color) {
      for (let i = 0; i < 12; i++) {
        const el = document.createElement('div');
        el.className = 'floaty';
        el.textContent = symbol;
        el.style.color = color;
        el.style.left = Math.random() * 90 + 5 + 'vw';
        el.style.top  = Math.random() * 60 + 20 + 'vh';
        el.style.animationDuration = (Math.random() * 1.5 + 1.5) + 's';
        el.style.animationDelay    = (Math.random() * 0.5) + 's';
        document.body.appendChild(el);
        el.addEventListener('animationend', () => el.remove());
      }
    }

    function doFlash() {
      const f = document.getElementById('flash');
      f.classList.remove('flash');
      void f.offsetWidth;
      f.classList.add('flash');
    }

    function showWinBanner(label, isCpu) {
      const banner = document.getElementById('win-banner');
      const text   = document.getElementById('win-text');
      const sub    = document.getElementById('win-sub');
      text.style.animation = 'none';
      sub.style.animation  = 'none';
      void text.offsetWidth;
      text.textContent = isCpu ? 'GAME OVER' : 'WINNER!';
      sub.textContent  = label;
      text.style.animation = 'bannerDrop 0.7s cubic-bezier(.22,.68,0,1.2) forwards, rainbowFlash 0.5s linear 0.7s infinite';
      sub.style.animation  = 'subFadeIn 0.4s ease 0.9s forwards, subtitleBounce 0.8s ease-in-out 1.3s infinite';
      banner.classList.add('show');
      setTimeout(() => banner.classList.remove('show'), 3500);
    }

    // ── Render a move onto the board ──────────────────────────
    function placeOnBoard(i, player) {
      board[i] = player;
      const cell = document.querySelector(`[data-i="${i}"]`);
      cell.textContent = player;
      cell.classList.add('taken', player.toLowerCase());
    }

    function lockBoard()   { document.querySelectorAll('.cell').forEach(c => c.classList.add('locked')); }
    function unlockBoard() { document.querySelectorAll('.cell').forEach(c => c.classList.remove('locked')); }

    // ── Resolve end of a turn ─────────────────────────────────
    function resolveTurn() {
      const result = checkBoard(board);
      if (!result) return false;

      gameOver = true;
      unlockBoard();

      if (result.winner) {
        const isX      = result.winner === 'X';
        const winColor = isX ? '#e94560' : '#a8dadc';
        result.line.forEach(idx => document.querySelector(`[data-i="${idx}"]`).classList.add('win'));
        scores[result.winner]++;

        const label = isX ? 'You strike! X wins!' : 'CPU strikes! O wins!';
        document.getElementById('status').textContent = isX ? 'You win!' : 'CPU wins!';
        doFlash();
        setTimeout(() => {
          showWinBanner(label, !isX);
          spawnConfetti(180);
          tickConfetti();
          burstFloaties(result.winner, winColor);
        }, 100);
      } else {
        scores.D++;
        document.getElementById('status').textContent = "It's a draw!";
      }

      document.getElementById('val-x').textContent = scores.X;
      document.getElementById('val-o').textContent = scores.O;
      document.getElementById('val-d').textContent = scores.D;
      document.getElementById('thinking').classList.remove('show');
      return true;
    }

    // ── CPU turn ──────────────────────────────────────────────
    function doCpuTurn() {
      document.getElementById('thinking').classList.add('show');
      lockBoard();

      // Small delay so the user can see the "thinking" indicator
      cpuThinkTimer = setTimeout(() => {
        document.getElementById('thinking').classList.remove('show');
        const move = cpuMove();
        if (move === -1) return;
        placeOnBoard(move, 'O');

        if (!resolveTurn()) {
          unlockBoard();
          document.getElementById('status').textContent = 'Your turn';
        }
      }, difficulty === 'hard' ? 500 : 350);
    }

    // ── Cell click ────────────────────────────────────────────
    document.querySelectorAll('.cell').forEach(cell => {
      cell.addEventListener('click', () => {
        const i = +cell.dataset.i;
        if (gameOver || board[i] || cell.classList.contains('locked')) return;

        placeOnBoard(i, 'X');
        if (!resolveTurn()) {
          document.getElementById('status').textContent = 'CPU is thinking...';
          doCpuTurn();
        }
      });
    });

    // ── Init ──────────────────────────────────────────────────
    function init() {
      if (cpuThinkTimer) { clearTimeout(cpuThinkTimer); cpuThinkTimer = null; }
      board = Array(9).fill('');
      gameOver = false;
      stopConfetti();
      unlockBoard();
      document.getElementById('win-banner').classList.remove('show');
      document.getElementById('thinking').classList.remove('show');
      document.querySelectorAll('.cell').forEach(c => { c.textContent = ''; c.className = 'cell'; });
      document.getElementById('status').textContent = 'Your turn';
    }

    document.getElementById('restart').addEventListener('click', init);
    init();
  </script>
</body>
</html>
